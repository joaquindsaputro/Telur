<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pabrik Konten Telur Misterius</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Caveat+Brush&family=Fredoka+One&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --egg-gradient: linear-gradient(135deg, #ff00cc, #333399);
            --crack-glow: #ffeb3b;
            --font-current: 'Bangers', cursive;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100dvh;
            font-family: var(--font-current); background: #000;
            user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none;
            position: relative;
        }

        /* --- SISTEM BACKGROUND AI CROSS-FADE --- */
        #bg-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            z-index: -3; transition: filter 0.5s;
        }
        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center bottom;
            background-repeat: no-repeat;
        }
        
        .layer-siang { background-color: #87CEEB; animation: fadeSiang 60s infinite linear; }
        .layer-sore  { background-color: #ff7e5f; animation: fadeSore 60s infinite linear; }
        .layer-malam { background-color: #1a1a2e; animation: fadeMalam 60s infinite linear; }
        .layer-pagi  { background-color: #3a4e5a; animation: fadePagi 60s infinite linear; }

        @keyframes fadeSiang { 0%, 15% { opacity: 1; } 25%, 85% { opacity: 0; } 95%, 100% { opacity: 1; } }
        @keyframes fadeSore  { 0%, 15% { opacity: 0; } 25%, 40% { opacity: 1; } 50%, 100% { opacity: 0; } }
        @keyframes fadeMalam { 0%, 40% { opacity: 0; } 50%, 65% { opacity: 1; } 75%, 100% { opacity: 0; } }
        @keyframes fadePagi  { 0%, 65% { opacity: 0; } 75%, 85% { opacity: 1; } 95%, 100% { opacity: 0; } }

        body.legendary-mode #bg-container { filter: sepia(0.5) hue-rotate(-15deg) saturate(2) brightness(0.8); }
        body.legendary-mode::after {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle, rgba(255,247,0,0.3), rgba(255,140,0,0.5));
            z-index: -2; pointer-events: none; mix-blend-mode: overlay;
        }

        /* --- OBJEK LANGIT BERGERAK --- */
        .cloud { position: absolute; font-size: 60px; opacity: 0.8; animation: floatCloud linear infinite; z-index: -1; pointer-events: none; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
        .c1 { top: 10%; left: -20%; animation-duration: 45s; font-size: 80px; }
        .c2 { top: 25%; left: -20%; animation-duration: 35s; animation-delay: 15s; }
        .c3 { top: 5%; left: -20%; animation-duration: 55s; animation-delay: 5s; font-size: 50px; }
        @keyframes floatCloud { to { transform: translateX(120vw); } }

        .airplane-banner {
            position: absolute; top: 18%; left: -60vw; display: flex; align-items: center; z-index: -1; pointer-events: none;
            animation: flyPlane 40s linear infinite; animation-delay: 5s; opacity: 0.9; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }
        .plane-emoji { font-size: 35px; margin-left: -5px; transform: rotate(15deg); }
        .banner-cloth { background: rgba(255,255,255,0.9); color: #d32f2f; font-size: 14px; padding: 4px 15px; border-radius: 2px; font-weight: bold; font-family: sans-serif; border-left: 4px solid #d32f2f; white-space: nowrap; }
        @keyframes flyPlane { 0% { transform: translateX(0) translateY(0); } 25% { transform: translateX(45vw) translateY(-15px); } 50% { transform: translateX(90vw) translateY(10px); } 75% { transform: translateX(135vw) translateY(-10px); } 100% { transform: translateX(180vw) translateY(0); } }

        /* --- ORBIT CELESTIAL --- */
        .celestial-orbit { position: absolute; bottom: -150vh; left: 50%; width: 0; height: 0; z-index: -2; }
        .orbit-rotator { position: absolute; width: 400vh; height: 400vh; left: -200vh; top: -200vh; border-radius: 50%; animation: rotateOrbit 60s infinite linear; }
        @keyframes rotateOrbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .celestial-body { position: absolute; font-size: 80px; width: 80px; height: 80px; text-align: center; line-height: 80px; left: 50%; margin-left: -40px; transition: opacity 0.3s; }
        .sun-emoji { top: 0; filter: drop-shadow(0 0 40px #ffd700); animation: spinSun 10s infinite linear, showSun 60s infinite linear; }
        @keyframes spinSun { to { transform: rotate(360deg); } }
        @keyframes showSun { 0%, 20% { opacity: 1; } 30%, 70% { opacity: 0; } 80%, 100% { opacity: 1; } }
        .moon-emoji { bottom: 0; transform: rotate(180deg); filter: drop-shadow(0 0 20px #ffffff); animation: showMoon 60s infinite linear; }
        @keyframes showMoon { 0%, 25% { opacity: 0; } 35%, 65% { opacity: 1; } 75%, 100% { opacity: 0; } }

        /* --- WATERMARK --- */
        .watermark-sign { position: absolute; bottom: 8vh; right: 5vw; z-index: 6; display: flex; flex-direction: column; align-items: center; transform: rotate(4deg); pointer-events: none; filter: drop-shadow(3px 5px 4px rgba(0,0,0,0.6)); }
        .watermark-board { background: linear-gradient(to bottom, #A0522D, #8B4513); border: 3px solid #5C3A21; border-radius: 6px; padding: 5px 12px; text-align: center; }
        .wm-sub { color: #fff; font-size: 14px; display: block; text-shadow: 1px 1px 0 #000; letter-spacing: 1px; }
        .wm-name { color: #FFD700; font-size: 18px; text-shadow: 2px 2px 0 #000; margin-top: 2px; }
        .watermark-post { width: 12px; height: 40px; background: linear-gradient(to right, #5C3A21, #3e2615); border-radius: 0 0 5px 5px; margin-top: -2px;}

        /* --- GAME AREA (DRAGGABLE) --- */
        .game-area-centered { 
            position: absolute; 
            top: 60%; /* Relatif ke tengah saat inisialisasi */
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 200px; height: 260px; 
            z-index: 10; display: flex; justify-content: center; 
            touch-action: none; /* Cegah scrolling saat di-drag */
            cursor: pointer;
        }
        
        .instruction { position: absolute; top: -140px; left: 50%; transform: translateX(-50%); color: #FFDE00; -webkit-text-stroke: 2px #000; text-shadow: 6px 6px 0px #000; font-size: 50px; font-weight: 900; white-space: pre-wrap; text-align: center; line-height: 1.1; width: 90vw; pointer-events: none; transition: all 0.2s; z-index: 15; letter-spacing: 3px; }
        .egg-shadow { position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); width: 140px; height: 30px; background: rgba(0,0,0,0.6); border-radius: 50%; z-index: 4; filter: blur(5px); }
        .egg-container { width: 100%; height: 100%; position: relative; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5)); z-index: 5; }
        
        .egg-base { width: 100%; height: 100%; background: var(--egg-gradient); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; position: absolute; top:0; left:0; box-shadow: inset -20px -20px 40px rgba(0,0,0,0.5), 0 20px 20px rgba(0,0,0,0.4); overflow: hidden; z-index: 5; }
        .egg-base::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' opacity='0.3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E"); mix-blend-mode: overlay; }
        
        .egg-base.pat-1 { --_g: var(--c1) 0% 5%,var(--c2) 6% 15%,var(--c1) 16% 25%,var(--c2) 26% 35%,var(--c1) 36% 45%,var(--c2) 46% 55%,var(--c1) 56% 65%,var(--c2) 66% 75%,var(--c1) 76% 85%,var(--c2) 86% 95%,#0000 96%; background: radial-gradient(50% 50% at 100% 0,var(--_g)), radial-gradient(50% 50% at 0 100%,var(--_g)), radial-gradient(50% 50%,var(--_g)), radial-gradient(50% 50%,var(--_g)) calc(var(--s)/2) calc(var(--s)/2) var(--c1); background-size: var(--s) var(--s); }
        .egg-base.pat-2 { --_g: var(--c1) 6.1%,var(--c2) 6.4% 18.6%,var(--c1) 18.9% 31.1%,var(--c2) 31.4% 43.6%,var(--c1) 43.9% 56.1%,var(--c2) 56.4% 68.6%,#0000 68.9%; background: radial-gradient(var(--s) at 100% 0,var(--_g)), radial-gradient(var(--s) at 0 0,var(--_g)), radial-gradient(var(--s) at 0 100%,var(--_g)), radial-gradient(var(--s) at 100% 100%,var(--_g)) var(--c1); background-size: var(--s) var(--s); }
        .egg-base.pat-3 { --_g: #0000 25%,#0008 47%,var(--c1) 53% 147%,var(--c2) 153% 247%,var(--c1) 253% 347%,var(--c2) 353% 447%,var(--c1) 453% 547%,#0008 553%,#0000 575%; --_s: calc(25%/3) calc(25%/4) at 50%; background: radial-gradient(var(--_s) 100%,var(--_g)), radial-gradient(var(--_s) 100%,var(--_g)) calc(var(--s)/2) calc(3*var(--s)/4), radial-gradient(var(--_s) 0,var(--_g)) calc(var(--s)/2) 0, radial-gradient(var(--_s) 0,var(--_g)) 0 calc(3*var(--s)/4), repeating-linear-gradient(90deg,var(--c3) calc(25%/-6) calc(25%/6),var(--c4) 0 calc(25%/2)); background-size: var(--s) calc(3*var(--s)/2); }
        .egg-base.pat-4 { --_s: 37.5% 12.5% at 62.5%; --_g: 34% 99%,#0000 101%; --g1: radial-gradient(var(--_s) 100%,#0000 32%,var(--c1) var(--_g)); --g2: radial-gradient(var(--_s) 0,#0000 32%,var(--c1) var(--_g)); --g3: radial-gradient(var(--_s) 100%,#0000 32%,var(--c2) var(--_g)); --g4: radial-gradient(var(--_s) 0,#0000 32%,var(--c2) var(--_g)); background: var(--g1), var(--g2) 0 calc(3*var(--s)), var(--g3) var(--s) calc(3*var(--s)), var(--g4) var(--s) calc(6*var(--s)), var(--g1) calc(2*var(--s)) calc(6*var(--s)), var(--g2) calc(2*var(--s)) calc(9*var(--s)), var(--g3) calc(3*var(--s)) calc(9*var(--s)), var(--g4) calc(3*var(--s)) 0, repeating-linear-gradient(var(--c1) 0 25%,var(--c2) 0 50%); background-size: calc(4*var(--s)) calc(12*var(--s)); }
        .egg-base.pat-5 { --_g: #0000 24%,var(--c2) 26% 34%,var(--c1) 36% 44%,var(--c2) 46% 54%,var(--c1) 56% 64%,var(--c2) 66% 74%,#0000 76%; background: radial-gradient(100% 100% at 100% 0,var(--_g)), radial-gradient(100% 100% at 0 100%,var(--_g)), radial-gradient(var(--c2) 14%,var(--c1) 16%) calc(var(--s)/2) calc(var(--s)/2); background-size: var(--s) var(--s); }

        .crack-overlay-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; filter: drop-shadow(0 0 8px var(--crack-glow)); }
        .crack-group { opacity: 0; transition: opacity 0.1s; }
        .crack-path { fill: none; stroke: var(--crack-glow); stroke-linecap: round; stroke-linejoin: round; }
        
        .shake-hard { animation: shakeHard 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeHard { 10%, 90% { transform: translate3d(-3px, 1px, 0) rotate(-3deg); } 20%, 80% { transform: translate3d(4px, -1px, 0) rotate(4deg); } 30%, 50%, 70% { transform: translate3d(-6px, 3px, 0) rotate(-6deg) scale(1.02); } 40%, 60% { transform: translate3d(6px, -3px, 0) rotate(6deg) scale(1.02); } }
        .shake-shadow { animation: shakeHardShadow 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeHardShadow { 30%, 50%, 70% { transform: translateX(-50%) scale(0.9); } 40%, 60% { transform: translateX(-50%) scale(1.1); } }
        
        /* Animal Reveal dipindah mengikuti gameArea */
        .animal-reveal { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) scale(0); font-size: 100px; z-index: 12; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; width: 300px; text-align: center; }
        .animal-reveal.show { transform: translateX(-50%) scale(1) translateY(-60px); animation: bounceAnimal 1s infinite alternate; z-index: 25; }
        @keyframes bounceAnimal { to { transform: translateX(-50%) scale(1.05) translateY(-80px); } }
        .shard { position: absolute; background: var(--egg-gradient); clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); pointer-events: none; z-index: 20; }
        
        /* --- UI OVERLAY & SETTINGS --- */
        #intro-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; text-align: center; font-family: sans-serif; }
        #settings-btn { position: absolute; top: 15px; left: 15px; font-size: 25px; opacity: 0.5; z-index: 2000; cursor: pointer; padding: 10px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }
        #settings-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 15px; z-index: 3000; width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-family: sans-serif; color: #333; }
        #settings-modal h3 { margin-top: 0; text-align: center; }
        .setting-row { margin-bottom: 15px; } .setting-row label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; } 
        .setting-row select, .setting-row input { width: 100%; padding: 8px; border-radius: 8px; font-size: 16px; border: 1px solid #ccc; }
        #close-settings { width: 100%; padding: 10px; background: #ff5e62; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor:pointer;}

        #cheat-zones { position: absolute; bottom: 0; left: 0; width: 100%; height: 15dvh; display: flex; z-index: 1000; opacity: 0; pointer-events: none; }
        .cheat-btn { flex: 1; height: 100%; pointer-events: auto; }

        #tap-feedback { position: fixed; font-size: 70px; pointer-events: none; z-index: 5000; opacity: 0; transform-origin: bottom right; transform: translate(-30%, -80%) rotate(0deg); filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); transition: opacity 0.1s ease-out; }
        
        .energy-orb { position: absolute; width: 15px; height: 15px; background: white; border-radius: 50%; opacity: 0; z-index: 15; box-shadow: 0 0 10px white; pointer-events: none; }
        @keyframes suckEnergy { 0% { transform: translate(var(--startX), var(--startY)) scale(1); opacity: 0.8; } 100% { transform: translate(0, 0) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1 style="font-size: 40px; margin-bottom: 10px;">🔴 SIAP REKAM?</h1>
        <p style="font-size: 18px;">Ketuk untuk mulai & Fullscreen.</p>
    </div>

    <div id="settings-btn" onclick="openSettings()">⭐</div>
    <div id="settings-modal">
        <h3>Pengaturan Studio</h3>
        <div class="setting-row">
            <label>Tema Latar AI:</label>
            <select id="sel-theme" onchange="updateSettings()">
                <option value="lego">🧱 Style Lego</option>
                <option value="pixar">🎬 3D Pixar</option>
                <option value="dinosaur">🦖 3D Dinosaurs</option>
                <option value="anomaly">👽 3D Anomaly</option>
            </select>
        </div>
        <div class="setting-row">
            <label>Nama Channel (Watermark):</label>
            <input type="text" id="inp-channel" value="@ChannelKu" onchange="updateSettings()">
        </div>
        <div class="setting-row">
            <label>Bahasa (Language):</label>
            <select id="sel-lang" onchange="updateSettings()">
                <option value="id">🇮🇩 Indonesia</option>
                <option value="en">🇬🇧 English</option>
            </select>
        </div>
        <div class="setting-row">
            <label>Jenis Font:</label>
            <select id="sel-font" onchange="updateSettings()">
                <option value="'Bangers', cursive">Bangers (Komik)</option>
                <option value="'Caveat Brush', cursive">Caveat (Kuas)</option>
                <option value="'Fredoka One', cursive">Fredoka (Tebal)</option>
                <option value="'Mochiy Pop One', sans-serif">Mochiy (Jepang)</option>
            </select>
        </div>
        <div class="setting-row">
            <label>Pengetuk Layar:</label>
            <select id="sel-tapper" onchange="updateSettings()">
                <option value="none">Kosong (Hanya Suara)</option>
                <option value="random">🎲 Ganti Random</option>
                <option value="🔨">🔨 Palu</option>
                <option value="🪄">🪄 Tongkat Sihir</option>
                <option value="🍭">🍭 Lolipop</option>
                <option value="⛏️">⛏️ Beliung</option>
            </select>
        </div>
        <button id="close-settings" onclick="closeSettings()">Simpan & Tutup</button>
    </div>

    <div id="tap-feedback"></div>

    <div id="bg-container">
        <div class="bg-layer layer-siang"></div>
        <div class="bg-layer layer-sore"></div>
        <div class="bg-layer layer-malam"></div>
        <div class="bg-layer layer-pagi"></div>
    </div>

    <div class="airplane-banner"><div class="banner-cloth" id="banner-text-display">SUBSCRIBE @ChannelKu</div><div class="plane-emoji">🛩️</div></div>

    <div class="cloud c1">☁️</div><div class="cloud c2">☁️</div><div class="cloud c3">☁️</div>
    <div class="celestial-orbit">
        <div class="orbit-rotator">
            <div class="celestial-body sun-emoji">☀️</div>
            <div class="celestial-body moon-emoji">🌕</div>
        </div>
    </div>
    
    <div class="watermark-sign">
        <div class="watermark-board"><span class="wm-sub">SUBSCRIBE</span><div class="wm-name" id="wm-name-display">@ChannelKu</div></div>
        <div class="watermark-post"></div>
    </div>

    <div class="game-area-centered" id="gameArea">
        <div class="instruction" id="statusText"></div>
        <div class="egg-shadow" id="eggShadow"></div>
        <div class="egg-container" id="eggContainer">
             <div class="egg-base" id="eggBase"></div>
             
             <svg class="crack-overlay-svg" viewBox="0 0 200 260">
                <defs><pattern id="pat-rare" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="4" fill="rgba(255,255,255,0.4)"/></pattern></defs>
                <path id="egg-pattern-dots" d="M100,10 C150,10 190,70 190,140 C190,210 150,250 100,250 C50,250 10,210 10,140 C10,70 50,10 100,10 Z" fill="url(#pat-rare)" style="opacity:0; transition:opacity 0.3s;" pointer-events="none"/>
                
                <g class="crack-group" id="stage1">
                    <path class="crack-path" d="M 100 130 L 85 105 L 70 100 M 85 105 L 90 90 M 100 130 L 125 145 L 140 130 M 125 145 L 130 160 M 100 130 L 105 160 L 95 180" stroke-width="2" />
                </g>
                <g class="crack-group" id="stage2">
                    <path class="crack-path" d="M 70 100 L 50 85 L 40 95 M 50 85 L 55 60 M 90 90 L 80 65 L 95 50 M 140 130 L 160 115 M 130 160 L 145 185 M 95 180 L 80 210 L 60 215" stroke-width="2.5" />
                </g>
                <g class="crack-group" id="stage3">
                    <path class="crack-path" d="M 40 95 L 20 105 M 55 60 L 45 35 M 95 50 L 105 20 M 160 115 L 185 100 L 195 110 M 160 115 L 170 85 M 145 185 L 165 215 L 150 240 M 80 210 L 85 245 M 60 215 L 35 230" stroke-width="3" />
                </g>
                <g class="crack-group" id="stage4">
                    <path class="crack-path" d="M 20 105 L 10 130 L 25 150 M 45 35 L 60 15 M 105 20 L 135 25 M 195 110 L 190 140 M 170 85 L 155 60 M 165 215 L 185 190 M 85 245 L 115 255 M 35 230 L 15 200 M 100 130 L 130 100 L 160 80 M 100 130 L 75 150 L 50 140 M 100 130 L 115 110 L 105 85" stroke-width="4" opacity="0.8" />
                    <path class="crack-path" d="M 100 130 L 130 100 M 130 100 L 160 80" stroke-width="2" opacity="0.6"/>
                </g>
            </svg>
        </div>
        <div class="animal-reveal" id="animalContent"></div>
    </div>

    <div id="cheat-zones">
        <div class="cheat-btn" onclick="setRarity('common')"></div>
        <div class="cheat-btn" onclick="setRarity('rare')"></div>
        <div class="cheat-btn" onclick="setRarity('legendary')"></div>
    </div>

    <script>
        let clicks = 0; let isBroken = false; let isProcessing = false; let audioCtx;
        
        const eggContainer = document.getElementById('eggContainer');
        const eggBase = document.getElementById('eggBase');
        const eggShadow = document.getElementById('eggShadow');
        const crackStages = [document.getElementById('stage1'), document.getElementById('stage2'), document.getElementById('stage3'), document.getElementById('stage4')];
        const animalDiv = document.getElementById('animalContent');
        const statusText = document.getElementById('statusText');
        const tapFeedback = document.getElementById('tap-feedback');
        const gameArea = document.getElementById('gameArea');
        const introOverlay = document.getElementById('intro-overlay');

        let forcedRarity = 'common'; 
        const randomTappers = ['🔨', '🍡', '🥄', '🍭', '🍢', '🪄', '🪓', '⛏️', '🗡️', '🧹'];

        const dict = {
            id: { start: "Ketuk/Geser\nTelurnya!", keep: "Terus\nKetuk!", harder: "Lebih\nKuat!", almost: "Sedikit\nLagi!", speciesCommon: "Wah,\nIsinya...", speciesRare: "Spesies\nLangka!", speciesLegend: "LEGENDARY!" },
            en: { start: "Tap/Drag\nthe Egg!", keep: "Keep\nTapping!", harder: "Hit\nHarder!", almost: "Almost\nThere!", speciesCommon: "Wow,\nIt's...", speciesRare: "Rare\nSpecies!", speciesLegend: "LEGENDARY!" }
        };

        let dbAnimals = {
            common: ['🐔', '🦆', '🐰', '🐭', '🐱', '🐶', '🐷'], rare: ['🦊', '🐼', '🐨', '🦁', '🐯', '🐙'], legendary: ['🦄', '🐉', '🦖', '🐦‍🔥']
        };

        fetch('data.csv').then(res => res.text()).then(data => {
            const rows = data.split('\n');
            rows.forEach(row => {
                const cols = row.split(',').map(item => item.trim()).filter(item => item !== "");
                if(cols.length > 1) { const tier = cols[0].toLowerCase(); if(dbAnimals[tier]) dbAnimals[tier] = cols.slice(1); }
            });
        }).catch(err => console.log("CSV gagal, pakai default."));

        let cfgLang = localStorage.getItem('cfgLang') || 'id';
        let cfgFont = localStorage.getItem('cfgFont') || "'Bangers', cursive";
        let cfgTapper = localStorage.getItem('cfgTapper') || 'none';
        let cfgChannel = localStorage.getItem('cfgChannel') || '@ChannelKu';
        let cfgTheme = localStorage.getItem('cfgTheme') || 'lego';

        document.getElementById('sel-lang').value = cfgLang; document.getElementById('sel-font').value = cfgFont;
        document.getElementById('sel-tapper').value = cfgTapper; document.getElementById('inp-channel').value = cfgChannel;
        document.getElementById('sel-theme').value = cfgTheme;

        function applyLanguage() { statusText.innerText = dict[cfgLang].start; }
        function applyWatermark() { document.getElementById('wm-name-display').innerText = cfgChannel; document.getElementById('banner-text-display').innerText = 'SUBSCRIBE ' + cfgChannel; }
        function applyThemeAI() {
            document.querySelector('.layer-pagi').style.backgroundImage = `url('themes/${cfgTheme}/pagi.jpg')`;
            document.querySelector('.layer-siang').style.backgroundImage = `url('themes/${cfgTheme}/siang.jpg')`;
            document.querySelector('.layer-sore').style.backgroundImage  = `url('themes/${cfgTheme}/sore.jpg')`;
            document.querySelector('.layer-malam').style.backgroundImage = `url('themes/${cfgTheme}/malam.jpg')`;
        }

        document.documentElement.style.setProperty('--font-current', cfgFont);
        applyLanguage(); applyWatermark(); applyThemeAI();

        function openSettings() { document.getElementById('settings-modal').style.display = 'block'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function updateSettings() {
            cfgLang = document.getElementById('sel-lang').value; cfgFont = document.getElementById('sel-font').value;
            cfgTapper = document.getElementById('sel-tapper').value; cfgChannel = document.getElementById('inp-channel').value;
            cfgTheme = document.getElementById('sel-theme').value;
            
            localStorage.setItem('cfgLang', cfgLang); localStorage.setItem('cfgFont', cfgFont); 
            localStorage.setItem('cfgTapper', cfgTapper); localStorage.setItem('cfgChannel', cfgChannel); localStorage.setItem('cfgTheme', cfgTheme);
            
            document.documentElement.style.setProperty('--font-current', cfgFont);
            applyWatermark(); applyThemeAI(); if(!isBroken && clicks === 0) applyLanguage(); 
        }

        introOverlay.addEventListener('click', () => { if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen(); } introOverlay.style.display = 'none'; initAudio(); });
        function setRarity(rarity) { forcedRarity = rarity; resetGame(); }

        // --- SISTEM DRAG & DROP & EVENT GABUNGAN ---
        let isPointerDown = false;
        let isDraggingEgg = false;
        let startDragX, startDragY;
        let eggOffsetX, eggOffsetY;
        let lastWallHit = 0;

        window.addEventListener('pointerdown', (e) => {
            isPointerDown = true;
            
            // Logika Tapper (Cursor Khusus)
            if(cfgTapper !== 'none') {
                tapFeedback.innerText = cfgTapper === 'random' ? randomTappers[Math.floor(Math.random() * randomTappers.length)] : cfgTapper;
                tapFeedback.style.transition = 'opacity 0.1s ease-out'; tapFeedback.style.opacity = 1;
                tapFeedback.style.left = e.clientX + 'px'; tapFeedback.style.top = e.clientY + 'px'; 
                tapFeedback.style.transform = 'translate(-30%, -80%) rotate(0deg)';
            }

            // Logika Pegang Telur (Drag)
            if (!isBroken && !isProcessing && e.target.closest('#eggContainer')) {
                isDraggingEgg = true;
                startDragX = e.clientX;
                startDragY = e.clientY;
                
                const rect = gameArea.getBoundingClientRect();
                const eggCenterX = rect.left + rect.width / 2;
                const eggCenterY = rect.top + rect.height / 2;
                
                // Simpan offset mouse terhadap titik tengah gameArea
                eggOffsetX = e.clientX - eggCenterX;
                eggOffsetY = e.clientY - eggCenterY;
                gameArea.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isPointerDown) return;

            // Update posisi tapper tool
            if (cfgTapper !== 'none') {
                tapFeedback.style.left = e.clientX + 'px'; tapFeedback.style.top = e.clientY + 'px';
            }

            // Update posisi telur & Cek tabrakan dinding
            if (isDraggingEgg) {
                let targetX = e.clientX - eggOffsetX;
                let targetY = e.clientY - eggOffsetY;

                const w = window.innerWidth;
                const h = window.innerHeight;
                const halfW = gameArea.offsetWidth / 2; // Offset lebar kontainer
                const halfH = gameArea.offsetHeight / 2; // Offset tinggi kontainer

                let hitWall = false;

                // Batas Dinding Layar
                if(targetX < halfW) { targetX = halfW; hitWall = true; }
                if(targetX > w - halfW) { targetX = w - halfW; hitWall = true; }
                if(targetY < halfH) { targetY = halfH; hitWall = true; }
                if(targetY > h - halfH) { targetY = h - halfH; hitWall = true; }

                gameArea.style.left = targetX + 'px';
                gameArea.style.top = targetY + 'px';

                if (hitWall) handleWallHit();
            }
        });

        window.addEventListener('pointerup', (e) => {
            isPointerDown = false;
            tapFeedback.style.opacity = 0;

            if (isDraggingEgg) {
                isDraggingEgg = false;
                gameArea.style.cursor = 'pointer';
                
                // Jika digeser sangat sedikit, anggap sebagai ketukan biasa
                let dist = Math.hypot(e.clientX - startDragX, e.clientY - startDragY);
                if (dist < 10) {
                    tapEgg();
                }
            }
        });

        function handleWallHit() {
            const now = Date.now();
            if (now - lastWallHit > 300) { // Cooldown 300ms agar tidak beruntun saat ditekan ke dinding
                lastWallHit = now;
                playThudSound();
                tapEgg(); // Retakkan telur layaknya diketuk
            }
        }

        // --- SISTEM AUDIO ---
        function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } if (audioCtx.state === 'suspended') { audioCtx.resume(); }}
        
        // SFX Thud saat nabrak dinding
        function playThudSound() {
            initAudio(); const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(100, t); osc.frequency.exponentialRampToValueAtTime(20, t + 0.15);
            gain.gain.setValueAtTime(0.8, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.15);
        }

        function playCrackSound(intensity) {
            initAudio(); const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50 + Math.random()*50, t); osc.frequency.exponentialRampToValueAtTime(10, t + 0.1); gain.gain.setValueAtTime(0.5 + (intensity * 0.1), t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15); const bufferSize = audioCtx.sampleRate * 0.1; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; const noise = audioCtx.createBufferSource(); noise.buffer = buffer; const noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.8, t); noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.1); osc.connect(gain); gain.connect(audioCtx.destination); noise.connect(noiseGain); noiseGain.connect(audioCtx.destination); osc.start(t); osc.stop(t + 0.15); noise.start(t);
        }
        function playRetroCry(isLegendary) {
            initAudio(); const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = isLegendary ? 'sawtooth' : 'square'; const baseFreq = isLegendary ? 800 : (400 + Math.random() * 400); osc.frequency.setValueAtTime(baseFreq, t); osc.frequency.setValueAtTime(baseFreq * 1.5, t + 0.05); osc.frequency.setValueAtTime(baseFreq * 0.5, t + 0.10); osc.frequency.setValueAtTime(baseFreq * 2.0, t + 0.15); osc.frequency.linearRampToValueAtTime(100, t + (isLegendary ? 0.8 : 0.4)); gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.3, t + 0.02); gain.gain.setValueAtTime(0.3, t + 0.3); gain.gain.exponentialRampToValueAtTime(0.001, t + (isLegendary ? 0.8 : 0.4)); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(t); osc.stop(t + (isLegendary ? 0.8 : 0.4));
        }

        function createEnergyOrbs() {
            const orbCount = forcedRarity === 'legendary' ? 20 : 10; const color = forcedRarity === 'legendary' ? 'gold' : 'cyan';
            for (let i = 0; i < orbCount; i++) {
                const orb = document.createElement('div'); orb.className = 'energy-orb'; orb.style.background = color; orb.style.boxShadow = `0 0 10px ${color}`;
                const angle = Math.random() * Math.PI * 2; const dist = 150 + Math.random() * 50; orb.style.setProperty('--startX', `${Math.cos(angle) * dist}px`); orb.style.setProperty('--startY', `${Math.sin(angle) * dist}px`); gameArea.appendChild(orb); orb.style.animation = `suckEnergy ${0.5 + Math.random() * 0.5}s ease-in forwards`; setTimeout(() => orb.remove(), 1000);
            }
        }

        // --- GAME LOGIC ---
        function tapEgg() {
            if (isBroken || isProcessing) return; let maxClicks = forcedRarity === 'legendary' ? 10 : (forcedRarity === 'rare' ? 7 : 4);
            initAudio(); clicks++; playCrackSound(clicks/maxClicks);
            
            if(cfgTapper !== 'none') { 
                tapFeedback.style.transition = 'transform 0.05s ease-out'; 
                tapFeedback.style.transform = 'translate(-30%, -80%) rotate(-50deg)'; 
                setTimeout(() => { if(isPointerDown) { tapFeedback.style.transition = 'transform 0.1s ease-in'; tapFeedback.style.transform = 'translate(-30%, -80%) rotate(0deg)'; } }, 100); 
            }
            if (navigator.vibrate) navigator.vibrate(50);
            eggContainer.classList.remove('shake-hard'); void eggContainer.offsetWidth; eggContainer.classList.add('shake-hard'); 
            eggShadow.classList.remove('shake-shadow'); void eggShadow.offsetWidth; eggShadow.classList.add('shake-shadow');
            
            if (forcedRarity !== 'common' && clicks === Math.floor(maxClicks/2)) createEnergyOrbs();
            
            if(clicks < maxClicks) { 
                const progress = clicks / maxClicks; 
                if(progress > 0.8) statusText.innerText = dict[cfgLang].almost; 
                else if(progress > 0.5) statusText.innerText = dict[cfgLang].harder; 
                else statusText.innerText = dict[cfgLang].keep; 
                
                const stageIndex = Math.floor((clicks / maxClicks) * crackStages.length); 
                if(stageIndex > 0 && stageIndex <= crackStages.length) crackStages[stageIndex - 1].style.opacity = 1; 
            } else { 
                isProcessing = true; setTimeout(breakEgg, 250); 
            }
        }

        function breakEgg() {
            isBroken = true; eggBase.style.opacity = '0'; crackStages.forEach(s => s.style.opacity = 0); eggShadow.style.opacity = '0'; document.getElementById('egg-pattern-dots').style.opacity = 0; 
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            if (forcedRarity === 'legendary') document.body.classList.add('legendary-mode'); 
            statusText.innerText = dict[cfgLang][forcedRarity === 'legendary' ? 'speciesLegend' : (forcedRarity === 'rare' ? 'speciesRare' : 'speciesCommon')];
            createExplodingShards(); 
            const pool = dbAnimals[forcedRarity]; const animalIndex = Math.floor(Math.random() * pool.length); animalDiv.innerText = pool[animalIndex]; animalDiv.classList.add('show');
            setTimeout(() => playRetroCry(forcedRarity === 'legendary'), 100);
            const particleAmt = forcedRarity === 'legendary' ? 300 : 150; confetti({ particleCount: particleAmt, spread: 80, origin: { y: 0.6 }, colors: forcedRarity === 'legendary' ? ['#FFD700', '#FFA500', '#FFFFFF'] : ['#FFD700', '#00FFFF', '#FF00FF'] });
            setTimeout(() => { isProcessing = false; }, 1200);
        }

        function createExplodingShards() {
            const rect = eggContainer.getBoundingClientRect(); const centerX = rect.width / 2; const centerY = rect.height / 2;
            for (let i = 0; i < 20; i++) { const shard = document.createElement('div'); shard.classList.add('shard'); const size = Math.random() * 30 + 10; shard.style.width = size + 'px'; shard.style.height = size + 'px'; shard.style.left = (centerX - size/2) + 'px'; shard.style.top = (centerY - size/2) + 'px'; shard.style.transform = `rotate(${Math.random()*360}deg)`; eggContainer.appendChild(shard); const angle = Math.random() * Math.PI * 2; const velocity = Math.random() * 15 + 10; let dx = Math.cos(angle) * velocity; let dy = Math.sin(angle) * velocity - 15; let opacity = 1; const anim = () => { if (opacity <= 0) { shard.remove(); return; } dy += 1.5; shard.style.top = (parseFloat(shard.style.top) + dy) + 'px'; shard.style.left = (parseFloat(shard.style.left) + dx) + 'px'; if (dy > 0) opacity -= 0.04; shard.style.opacity = opacity; requestAnimationFrame(anim); }; requestAnimationFrame(anim); }
        }

        function getRandColors(count) { const legColors = ['#FFD700', '#FF4500', '#DC143C', '#8A2BE2', '#00FFFF', '#FF1493', '#32CD32', '#FF00FF', '#1E90FF']; return legColors.sort(() => 0.5 - Math.random()).slice(0, count); }

        function resetGame() {
            clicks = 0; isBroken = false; isProcessing = false; applyLanguage(); 
            
            // Kembalikan Posisi Telur ke Tengah
            gameArea.style.left = '50%';
            gameArea.style.top = '60%';
            
            eggBase.style.opacity = '1'; eggShadow.style.opacity = '1'; crackStages.forEach(s => s.style.opacity = 0); animalDiv.classList.remove('show'); document.body.classList.remove('legendary-mode');
            eggBase.className = 'egg-base'; const pDots = document.getElementById('egg-pattern-dots'); pDots.style.opacity = 0; 
            if (forcedRarity === 'rare') { document.documentElement.style.setProperty('--egg-gradient', 'linear-gradient(135deg, #11998e, #38ef7d)'); pDots.style.opacity = 0.6; } 
            else if (forcedRarity === 'legendary') { const patNum = Math.floor(Math.random() * 5) + 1; eggBase.classList.add(`pat-${patNum}`); const cols = getRandColors(4); eggBase.style.setProperty('--c1', cols[0]); eggBase.style.setProperty('--c2', cols[1]); eggBase.style.setProperty('--c3', cols[2]); eggBase.style.setProperty('--c4', cols[3]); const sizes = { 1: '150px', 2: '150px', 3: '140px', 4: '30px', 5: '100px' }; eggBase.style.setProperty('--s', sizes[patNum]); } 
            else { document.documentElement.style.setProperty('--egg-gradient', 'linear-gradient(135deg, #ff00cc, #333399)'); }
        }
        
        resetGame();
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Gagal:', err)); }); }
    </script>
</body>
